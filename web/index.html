  return (agent && (agent.project || displayName(agent))) || 'Terminal';
}

function terminalSecondaryLabel(agent) {
  if (!agent) return '';
  const parts = [];
  const primary = terminalPrimaryLabel(agent);
  const tab = tabLabel(agent);
  if (tab) parts.push(tab);
  if (agent.agent && agent.agent !== primary && agent.agent !== tab) parts.push(agent.agent);
  const host = hostLabel(agent);
  if (host) {
    if (parts.length) parts[parts.length - 1] = `${parts[parts.length - 1]} @${host}`;
    else parts.push(`@${host}`);
  }
  return parts.join(' · ');
}

function terminalHeaderHtml(agent) {
  const primary = escapeHtml(terminalPrimaryLabel(agent));
  const secondary = escapeHtml(terminalSecondaryLabel(agent));
  return secondary
    ? `<span class="title-main">${primary}</span><span class="title-meta">${secondary}</span>`
    : primary;
}

function paneSnapshotFromAgent(agent) {
  return {
    pane_id: agent.pane_id,
    relay_id: agent.relay_id,
    raw_pane_id: agent.raw_pane_id,
    title: terminalTitle(agent),
  };
}

function paneSnapshotFromId(paneId) {
  if (!paneId) return null;
  const relay = relayConfigs.find(r => paneId.startsWith(`${r.id}::`));
  if (!relay) return null;
  const rawPaneId = paneId.slice(relay.id.length + 2);
  if (!rawPaneId) return null;
  return {
    pane_id: paneId,
    relay_id: relay.id,
    raw_pane_id: rawPaneId,
    title: paneId,
  };
}

function activePaneTarget() {
  if (!activePane) return null;
  const agent = activeAgent();
  if (agent) {
    activePaneSnapshot = paneSnapshotFromAgent(agent);
    return activePaneSnapshot;
  }
  if (activePaneSnapshot && activePaneSnapshot.pane_id === activePane) return activePaneSnapshot;
  activePaneSnapshot = paneSnapshotFromId(activePane);
  return activePaneSnapshot;
}

function syncTerminalChrome(agent) {
  const title = agent ? terminalTitle(agent) : (activePaneSnapshot && activePaneSnapshot.title) || activePane || 'Terminal';
  updateAppChrome(title);
  if (agent) document.getElementById('appTitle').innerHTML = terminalHeaderHtml(agent);
  document.getElementById('termTitle').textContent = title;
  renderTerminalActions(agent);
}

function syncActiveTerminal(refreshWhenRestored = false) {
  if (currentView !== 'terminal' || !activePane) return;
  const agent = activeAgent();
  if (!agent) return;
  activePaneSnapshot = paneSnapshotFromAgent(agent);
  syncTerminalChrome(agent);
  if (refreshWhenRestored) refreshPane();
}

function updateAppChrome(title = APP_TITLE) {
  document.body.dataset.view = currentView;
  document.getElementById('appTitle').textContent = title;
  updateThemeColor();
}

function activeAgent() {
  return activePane ? agents.find(x => x.pane_id === activePane) : null;
}

function updateBottomChromeHeight() {
  const view = document.getElementById('terminalView');
  if (!view) return;
  requestAnimationFrame(() => {
    const selectors = ['.term-input', '#uploadStatus', '.quick-actions', '.term-keys'];
    const height = selectors.reduce((sum, selector) => {
      const el = view.querySelector(selector);
      if (!el || getComputedStyle(el).display === 'none') return sum;
      return sum + el.offsetHeight;
    }, 0);
    view.style.setProperty('--bottom-chrome-height', `${height || 94}px`);
  });
}

function showJumpToBottom() {
  const btn = document.getElementById('jumpBottomButton');
  if (btn) btn.classList.add('active');
}

function hideJumpToBottom() {
  const btn = document.getElementById('jumpBottomButton');
  if (btn) btn.classList.remove('active');
}

function jumpToTerminalBottom() {
  const term = document.getElementById('termContent');
  if (!term) return;
  term.scrollTop = term.scrollHeight;
  hideJumpToBottom();
}

function handleTerminalScroll() {
  const term = document.getElementById('termContent');
  if (!term) return;
  const distanceFromBottom = term.scrollHeight - term.scrollTop - term.clientHeight;
  if (distanceFromBottom < 48) hideJumpToBottom();
}

function chooseImages() {
  if (!activePane) return;
  const input = document.getElementById('imageInput');
  if (input) input.click();
}

async function uploadSelectedImages(fileList) {
  const files = [...(fileList || [])].filter(file => file && file.type && file.type.startsWith('image/'));
  if (!files.length) return;
  for (const file of files) {
    await uploadImageFile(file);
  }
}

async function uploadImageFile(file) {
  const target = activePaneTarget();
  if (!target) {
    setUploadStatus('Open a terminal before attaching an image.', true);
    return false;
  }
  const conn = connections.get(target.relay_id);
  if (!conn || !conn.ws || conn.ws.readyState !== 1) {
    setUploadStatus('Relay is not connected.', true);
    return false;
  }
  if (file.size > IMAGE_UPLOAD_MAX_BYTES) {
    setUploadStatus('Image is larger than 10 MB.', true);
    return false;
  }

  const requestId = `upload-${Date.now()}-${Math.random().toString(36).slice(2)}`;
  pendingImageUploads.set(requestId, {paneId: target.pane_id, filename: file.name || 'image'});
  setUploadStatus(`Uploading ${file.name || 'image'}...`);
  try {
    const data = await readFileAsDataURL(file);
    conn.ws.send(JSON.stringify({
      type: 'upload_image',
      request_id: requestId,
      pane_id: target.raw_pane_id,
      filename: file.name || 'image',
      mime: file.type || 'application/octet-stream',
      data,
    }));
    return true;
  } catch (_err) {
    pendingImageUploads.delete(requestId);
    setUploadStatus('Image upload failed.', true);
    return false;
  }
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function handleUploadResult(relayId, msg) {
  const pending = pendingImageUploads.get(msg.request_id) || {};
  pendingImageUploads.delete(msg.request_id);
  if (!msg.ok) {
    setUploadStatus(msg.error || 'Image upload failed.', true);
    return;
  }
  const paneId = pending.paneId || clientPaneId(relayId, msg.pane_id || '');
  if (paneId === activePane && msg.path) {
    insertComposerText(`Image: ${msg.path}\n`);
  }
  setUploadStatus(`Image attached: ${uploadBasename(msg.path || pending.filename || 'image')}`);
}

function uploadBasename(path) {
  return String(path || '').split(/[\\/]/).filter(Boolean).pop() || 'image';
}

function insertComposerText(text) {
  const input = document.getElementById('termInput');
  if (!input) return;
  const prefix = input.value && !input.value.endsWith('\n') ? '\n' : '';
  const insertion = prefix + text;
  const start = input.selectionStart ?? input.value.length;
  const end = input.selectionEnd ?? input.value.length;
  input.value = input.value.slice(0, start) + insertion + input.value.slice(end);
  const cursor = start + insertion.length;
  input.selectionStart = cursor;
  input.selectionEnd = cursor;
  handleComposerInput();
  input.focus();
}

function setUploadStatus(message, error = false) {
  const el = document.getElementById('uploadStatus');
  if (!el) return;
  if (uploadStatusTimer) clearTimeout(uploadStatusTimer);
  el.textContent = message || '';
  el.classList.toggle('active', Boolean(message));
  el.classList.toggle('error', Boolean(error));
  updateBottomChromeHeight();
  if (message && !error) {
    uploadStatusTimer = setTimeout(() => {
      el.textContent = '';
      el.classList.remove('active', 'error');
      updateBottomChromeHeight();
    }, 4000);
  }
}

function handleComposerPaste(event) {
  const items = event.clipboardData && event.clipboardData.items;
  if (!items) return;
  const files = [...items]
    .filter(item => item.kind === 'file' && item.type && item.type.startsWith('image/'))
    .map(item => item.getAsFile())
    .filter(Boolean);
  if (!files.length) return;
  event.preventDefault();
  uploadSelectedImages(files);
}

function sendToAgent(agent, payload) {
  if (!agent) return false;
  const conn = connections.get(agent.relay_id);
  if (!conn || !conn.ws || conn.ws.readyState !== 1) return false;
  conn.ws.send(JSON.stringify({...payload, pane_id: agent.raw_pane_id}));
  return true;
}

function sendToActive(payload) {
  const target = activePaneTarget();
  if (!target) return false;
  return sendToTarget(target, payload);
}

function sendToTarget(target, payload) {
  const conn = connections.get(target.relay_id);
  if (!conn || !conn.ws || conn.ws.readyState !== 1) return false;
  conn.ws.send(JSON.stringify({...payload, pane_id: target.raw_pane_id}));
  return true;
}

function refreshPane() { sendToActive({type:'read_pane',lines:TERMINAL_HISTORY_LINES,format:'ansi'}); }
function composerPromptText(input) {
  return String(input && input.value || '').replace(/[\r\n]+$/g, '');
}
function sendText() {
  const i=document.getElementById('termInput');
  const text=composerPromptText(i);
  const target=activePaneTarget();
  const agent=activeAgent();
  if(!text||!target)return;
  if (!sendToTarget(target,{type:'send_text',text})) return;
  sendToTarget(target,{type:'send_keys',keys:['Enter']});
  if (usesCodexSubmitWorkaround(agent)) {
    setTimeout(() => sendToTarget(target,{type:'send_keys',keys:['Tab']}), 160);
  }
  lastInsertedBackspaces += text.length + 1;
  i.value=''; handleComposerInput(); setTimeout(refreshPane,500);
}
function usesCodexSubmitWorkaround(agent){
  return /\bcodex\b/i.test(String(agent&&agent.agent||''));
}
function handleComposerInput(){
  resizeComposer();
  updateComposerState();
}
function resizeComposer(){
  const i=document.getElementById('termInput');
  if(!i)return;
  i.style.height='auto';
  i.style.height=Math.min(i.scrollHeight,112)+'px';
  updateBottomChromeHeight();
}
function updateComposerState(){
  const i=document.getElementById('termInput');
  const send=document.getElementById('sendButton');
  const field=document.getElementById('composerField');
  const hasText=Boolean(composerPromptText(i));
  if(send) send.disabled=!hasText;
  if(field) field.classList.toggle('has-text', hasText);
}
function sendKey(k){if(!activePane)return;sendToActive({type:'send_keys',keys:[k]});setTimeout(refreshPane,300);}
function sendKeys(k){if(!activePane)return;sendToActive({type:'send_keys',keys:k});setTimeout(refreshPane,300);}
function submitPrompt(){
  const i=document.getElementById('termInput');
  if(i&&composerPromptText(i)){sendText();return;}
  updateComposerState();
}
function handleComposerBeforeInput(event){
  if(!['insertLineBreak','insertParagraph'].includes(event.inputType)||event.isComposing)return;
  event.preventDefault();
  submitPrompt();
}
function handleComposerKeyDown(event){
  if(event.key!=='Enter'||event.shiftKey||event.altKey||event.ctrlKey||event.metaKey||event.isComposing)return;
  event.preventDefault();
  submitPrompt();
}
function cancelPrompt(){lastInsertedBackspaces=0;sendKey('Escape');}
function interruptPrompt(){lastInsertedBackspaces=0;sendKeys(['Ctrl+c']);}
function clearPromptText(){
  const i=document.getElementById('termInput');
  lastInsertedBackspaces=0;
  if(i){i.value='';handleComposerInput();i.focus();}
}
function toggleArrows(event){
  if(event) event.stopPropagation();
  document.getElementById('arrowPopup').classList.toggle('show');
}
function hideArrows(){document.getElementById('arrowPopup').classList.remove('show');}
function respond(index, total){
  if(!activePane)return;
  if(typeof index!=='number'||index<0)return;
  if(!sendToActive({type:'respond',index,total}))return;
  markPaneResponding(activePane);
  document.getElementById('quickActions').innerHTML='';
  document.getElementById('terminalView').classList.remove('has-quick-actions');
  updateBottomChromeHeight();
  setTimeout(refreshPane,500);
}
function respondForPane(paneId,index,total){
  if(typeof index!=='number'||index<0)return;
  const agent=agents.find(x=>x.pane_id===paneId);
  if(!sendToAgent(agent,{type:'respond',index,total}))return;
  markPaneResponding(paneId);
  if(activePane===paneId){
    document.getElementById('quickActions').innerHTML='';
    document.getElementById('terminalView').classList.remove('has-quick-actions');
    updateBottomChromeHeight();
    setTimeout(refreshPane,500);
  }
}
document.addEventListener('click', hideArrows);
document.getElementById('termInput').addEventListener('paste', handleComposerPaste);
document.getElementById('termInput').addEventListener('beforeinput', handleComposerBeforeInput);
document.getElementById('termInput').addEventListener('keydown', handleComposerKeyDown);
document.getElementById('termContent').addEventListener('scroll', handleTerminalScroll);
window.addEventListener('resize', updateBottomChromeHeight);

window.addEventListener('popstate', event => {
  const state = event.state && event.state.herdrView ? event.state : {view: 'agents', index: 0};
  viewIndex = Number.isInteger(state.index) ? state.index : 0;
  applyView(state);
});

window.addEventListener('hashchange', () => {
  applyView(stateFromLocation());
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', event => {
    const data = event.data || {};
    if (data.type === 'herdr_notification_click' && data.url) routeNotificationUrl(data.url);
  });
}

function initializeView() {
  const initialState = relayConfigs.length ? stateFromLocation() : {view: 'agents'};
  replaceView({view: 'agents'});
  if (initialState.view !== 'agents') navigateTo(initialState);
}

initializeView();
if (deviceVerificationEnabled()) requireDeviceUnlock('open');
else startAppConnections();

document.addEventListener('visibilitychange', () => {
  if (!deviceVerificationEnabled()) return;
  if (document.visibilityState === 'hidden') {
    lockForDevice('resume');
  } else if (securityLocked) {
    setTimeout(() => unlockWithDevice('resume'), 150);
  }
});

window.addEventListener('pageshow', event => {
  if (!event.persisted || !deviceVerificationEnabled()) return;
  lockForDevice('resume');
  setTimeout(() => unlockWithDevice('resume'), 150);
});

window.addEventListener('focus', () => {
  if (!deviceVerificationEnabled() || !securityLocked || document.visibilityState !== 'visible') return;
  setTimeout(() => unlockWithDevice('resume'), 150);
});
</script>
