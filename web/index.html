<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Herdr Relay">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Herdr Mobile Relay</title>
<style>
:root {
  --bg: #0a0a0a; --surface: #1a1a1a; --border: #222; --text: #e5e5e5; --muted: #888;
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #ffd166; --orange: #f97316;
  --header-height: 49px;
  --terminal-font-size: 0.62rem;
  --terminal-bg: #0b0b0c; --terminal-text: #d0d0d0;
}
[data-theme="light"] {
  --bg: #f5f5f5; --surface: #fff; --border: #ddd; --text: #1a1a1a; --muted: #666;
  --yellow: #ca8a04;
}
[data-theme="nord"] {
  --bg: #2e3440; --surface: #3b4252; --border: #434c5e; --text: #eceff4; --muted: #8fbcbb;
  --green: #a3be8c; --red: #bf616a; --blue: #81a1c1; --yellow: #ebcb8b; --orange: #d08770;
}
[data-theme="solarized"] {
  --bg: #002b36; --surface: #073642; --border: #586e75; --text: #839496; --muted: #657b83;
  --green: #859900; --red: #dc322f; --blue: #268bd2; --yellow: #b58900; --orange: #cb4b16;
}
[data-theme="rose"] {
  --bg: #191724; --surface: #1f1d2e; --border: #26233a; --text: #e0def4; --muted: #908caa;
  --green: #9ccfd8; --red: #eb6f92; --blue: #c4a7e7; --yellow: #f6c177; --orange: #f6c177;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }
body[data-view="terminal"] { --header-height: 38px; }

.header { height: var(--header-height); padding: 0 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header h1 { font-size: 1rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.header button { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px; min-width: 30px; }
.header-back { display: none; }
body[data-view="terminal"] .header { padding: 0 10px; gap: 6px; }
body[data-view="terminal"] .header h1 { display: flex; flex-direction: column; justify-content: center; gap: 1px; font-size: 0.78rem; font-weight: 500; line-height: 1.1; }
body[data-view="terminal"] .header .title-main { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
body[data-view="terminal"] .header .title-meta { color: var(--muted); font-size: 0.62rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
body[data-view="terminal"] .header-back { display: block; }
body[data-view="terminal"] #statusDot, body[data-view="terminal"] #agentCount { display: none; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.view { flex: 1; overflow-y: auto; }

/* Settings */
.settings { display: none; padding: 16px; }
.settings.active { display: block; }
.settings h2 { font-size: 0.9rem; margin-bottom: 12px; }
.setting-group { background: var(--surface); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.setting-group label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 6px; }
.setting-group input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
.setting-group select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
.setting-group .hint { font-size: 0.65rem; color: var(--muted); margin-top: 4px; }
.setting-group button { margin-top: 8px; padding: 8px 16px; border-radius: 6px; border: none; background: var(--green); color: #000; font-weight: 600; font-size: 13px; cursor: pointer; }
.setting-group button.secondary { background: var(--border); color: var(--text); }
.setting-group button.danger { background: var(--red); color: #fff; }
.toggle-row { display: flex !important; align-items: center; justify-content: space-between; gap: 12px; margin: 0 !important; color: var(--text) !important; }
.toggle-row span { font-size: 0.75rem; color: var(--muted); }
.setting-group .toggle-row input { width: 18px; height: 18px; padding: 0; flex-shrink: 0; accent-color: var(--green); }
.relay-list { margin-top: 12px; border-top: 1px solid var(--border); }
.relay-row { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.relay-row .info { flex: 1; min-width: 0; }
.relay-row .name { font-size: 0.78rem; font-weight: 600; }
.relay-row .url { font-size: 0.64rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.relay-row .push-state { font-size: 0.62rem; color: var(--muted); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.relay-row .push-state .mini-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.relay-row button { margin-top: 0; padding: 6px 10px; font-size: 12px; }
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.setting-group .theme-btn { margin-top: 0; padding: 8px; border-radius: 6px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.7rem; font-weight: 600; cursor: pointer; text-align: center; }
.font-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.setting-group .font-btn { margin-top: 0; padding: 8px; border-radius: 6px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.7rem; font-weight: 600; cursor: pointer; text-align: center; }
.setting-group .font-btn[data-size="compact"] { font-size: 0.62rem; }
.setting-group .font-btn[data-size="regular"] { font-size: 0.72rem; }
.setting-group .font-btn[data-size="large"] { font-size: 0.82rem; }
.setting-group .theme-btn.active, .setting-group .font-btn.active { border-color: var(--green); background: var(--green); color: #050505; box-shadow: 0 0 0 1px var(--green); }
[data-terminal-font="regular"] { --terminal-font-size: 0.72rem; }
[data-terminal-font="large"] { --terminal-font-size: 0.82rem; }

/* Agent list */
.agents { padding: 12px; }
.section-header { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); margin: 12px 0 6px; display: flex; align-items: center; gap: 5px; }
.agent { background: var(--surface); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.agent.blocked-agent { align-items: flex-start; }
.agent:active { opacity: 0.7; }
.agent .dot { flex-shrink: 0; }
.agent.blocked-agent > .dot { margin-top: 0.25rem; }
.agent .info { flex: 1; }
.agent .project { font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.agent .meta { font-size: 0.65rem; color: var(--muted); }
.agent .prompt-preview { margin-top: 6px; color: var(--text); font-family: 'SF Mono', 'Menlo', monospace; font-size: 0.68rem; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; overflow-wrap: anywhere; }
.agent-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.agent-actions button { border: none; border-radius: 7px; padding: 7px 10px; font-size: 0.68rem; font-weight: 700; cursor: pointer; min-width: 52px; max-width: 100%; overflow-wrap: anywhere; }
.host-badge { color: var(--orange); font-size: 0.6rem; font-weight: 600; }

/* Terminal view */
.terminal-view { display: none; flex-direction: column; position: fixed; inset: 0; top: var(--header-height); background: var(--bg); z-index: 50; --bottom-chrome-height: 94px; }
.terminal-view.active { display: flex; }
.term-header { display: none; padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: center; gap: 8px; flex-shrink: 0; }
.term-header .back { background: none; border: none; color: var(--blue); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; }
.term-header .title { flex: 1; font-size: 0.8rem; font-weight: 500; }
.term-header .refresh-btn { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
.term-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 12px; background: var(--terminal-bg); font-family: 'SF Mono', 'Menlo', monospace; font-size: var(--terminal-font-size); line-height: 1.5; white-space: pre-wrap; overflow-wrap: break-word; word-break: normal; color: var(--terminal-text); -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
.term-separator { display: block; height: 1px; margin: 0.35em 0; background: currentColor; opacity: 0.3; }
.jump-bottom { display: none; position: absolute; right: 12px; bottom: calc(var(--bottom-chrome-height, 94px) + 10px); z-index: 4; min-width: 46px; min-height: 34px; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); box-shadow: 0 8px 24px rgba(0,0,0,0.35); font-size: 1rem; cursor: pointer; }
.jump-bottom.active { display: flex; }
.quick-actions { padding: 6px 8px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; background: var(--surface); }
.quick-actions:empty { display: none; }
.quick-actions button { padding: 8px 12px; min-height: 40px; border-radius: 8px; border: none; font-size: 0.72rem; font-weight: 700; cursor: pointer; flex: 1; min-width: 70px; }
.btn-yes { background: var(--green); color: #000; } .btn-trust { background: var(--blue); color: #fff; } .btn-no { background: var(--red); color: #fff; } .btn-next { background: var(--surface); color: var(--blue); border: 1px solid var(--border) !important; }
.term-input { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 6px 8px; display: flex; gap: 6px; background: var(--surface); flex-shrink: 0; align-items: flex-end; }
.composer-field { position: relative; flex: 1; min-width: 0; }
.term-input textarea { width: 100%; min-height: 44px; max-height: 112px; padding: 11px 36px 10px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.35; font-family: monospace; resize: none; overflow-y: auto; display: block; }
.term-input textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
.term-input button { width: 44px; min-height: 44px; border-radius: 8px; border: 1px solid transparent; background: transparent; color: var(--muted); font-weight: 700; font-size: 1rem; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.term-input button:active { background: var(--border); }
.term-input .attach-btn svg { width: 18px; height: 18px; stroke: currentColor; }
.term-input .send-btn { background: var(--green); border-color: var(--green); color: #050505; font-size: 1.05rem; }
.term-input .send-btn:disabled { opacity: 0.35; filter: grayscale(1); cursor: default; }
.composer-field .input-clear-btn { display: none; position: absolute; right: 4px; bottom: 4px; width: 32px; min-height: 36px; border-radius: 6px; font-size: 1rem; }
.composer-field.has-text .input-clear-btn { display: flex; }
.upload-status { display: none; padding: 5px 12px; border-top: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 0.65rem; line-height: 1.25; flex-shrink: 0; }
.upload-status.active { display: block; }
.upload-status.error { color: var(--red); }
.terminal-view.has-quick-actions .term-keys { display: none; }
.term-keys { position: relative; z-index: 2; border-top: 1px solid var(--border); padding: 4px 8px; display: flex; gap: 5px; background: var(--surface); flex-shrink: 0; padding-bottom: max(4px, env(safe-area-inset-bottom, 0px)); align-items: center; overflow: visible; }
.term-keys button { padding: 8px 11px; min-height: 40px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap; }
.term-keys button:active { background: var(--border); }
.term-keys .spacer { flex: 1; }
.arrow-toggle { position: relative; }
.arrow-popup { display: none; position: absolute; z-index: 20; bottom: 46px; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.arrow-popup.show { display: grid; grid-template-columns: repeat(3, 44px); grid-template-rows: repeat(3, 44px); gap: 4px; }
.arrow-popup button { width: 44px; height: 44px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.arrow-popup button:active { background: var(--border); }
.arrow-popup .empty { visibility: hidden; }

.empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.85rem; }

/* Device lock */
.lock-screen { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(0,0,0,0.84); backdrop-filter: blur(8px); }
.lock-screen.active { display: flex; }
.lock-panel { width: min(360px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px; box-shadow: 0 16px 60px rgba(0,0,0,0.45); }
.lock-panel h2 { font-size: 1rem; margin-bottom: 8px; }
.lock-panel p { color: var(--muted); font-size: 0.75rem; line-height: 1.45; margin-bottom: 12px; }
.lock-panel button { width: 100%; padding: 12px 14px; border-radius: 6px; border: none; background: var(--green); color: #050505; font-weight: 700; font-size: 0.8rem; cursor: pointer; }
.lock-status { min-height: 1rem; margin-top: 10px; color: var(--muted); font-size: 0.68rem; }

/* Desktop */
@media (min-width: 768px) {
  body { max-width: 1200px; margin: 0 auto; }
  .terminal-view { position: static; display: none; }
  .terminal-view.active { display: flex; height: calc(100dvh - var(--header-height)); }
  .agents { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
  .section-header { grid-column: 1 / -1; }
  .term-content { min-height: 300px; }
  .term-keys { padding: 6px 8px; gap: 4px; padding-bottom: 6px; }
  .term-keys button { padding: 8px 12px; min-height: auto; border-radius: 6px; font-size: 13px; }
}
@media (pointer: fine) {
  .term-keys .arrow-toggle { display: none; }
  .quick-actions button { flex: none; min-width: auto; padding: 8px 18px; }
}
</style>
</head>
<body>

<div class="header">
  <button class="header-back" id="headerBack" onclick="closeCurrentView()" aria-label="Back">‹</button>
  <span class="dot" id="statusDot"></span>
  <h1 id="appTitle">🐑 herdr</h1>
  <span id="agentCount" style="font-size:0.7rem;color:var(--muted)"></span>
  <button id="settingsButton" onclick="toggleSettings()" aria-label="Settings">⚙</button>
</div>

<div class="lock-screen" id="lockScreen" role="dialog" aria-modal="true" aria-labelledby="lockTitle" aria-describedby="lockDescription">
  <div class="lock-panel">
    <h2 id="lockTitle">Unlock Herdr</h2>
    <p id="lockDescription">Verify with your device fingerprint, face unlock, or passcode before connecting to relays.</p>
    <button id="lockUnlockButton" onclick="unlockWithDevice()">Unlock</button>
    <div class="lock-status" id="lockStatus"></div>
  </div>
</div>

<div class="settings" id="settingsView">
  <h2>Settings</h2>
  <div class="setting-group">
    <label>Relay Name</label>
    <input id="relayLabel" type="text" placeholder="Fedora" />
    <label>Relay URL</label>
    <input id="relayUrl" type="url" placeholder="wss://relay-fedora.example.com" />
    <label style="margin-top:8px">Token</label>
    <input id="relayToken" type="password" placeholder="HERDR_RELAY_TOKEN" />
    <button onclick="addRelay()">Add Relay</button>
    <button class="secondary" onclick="connectAll()">Reconnect All</button>
    <div class="relay-list" id="relayList"></div>
    <div class="hint">Use one relay URL per computer, such as <code>wss://relay-mac.example.com</code> and <code>wss://relay-fedora.example.com</code>.</div>
  </div>
  <div class="setting-group">
    <label>Theme</label>
    <div class="theme-grid" id="themeGrid"></div>
  </div>
  <div class="setting-group">
    <label>Terminal Font Size</label>
    <div class="font-grid" id="fontGrid"></div>
  </div>
  <div class="setting-group">
    <label>Terminal Display</label>
    <label class="toggle-row">
      <span>Show Agent Status Line</span>
      <input id="codexStatusLineToggle" type="checkbox" onchange="setCodexStatusLineVisible(this.checked)" />
    </label>
  </div>
  <div class="setting-group">
    <label>Notifications</label>
    <button id="notificationButton" onclick="toggleNotifications()">Enable Notifications</button>
    <div class="hint" id="notificationHint"></div>
  </div>
  <div class="setting-group">
    <label>Security</label>
    <label class="toggle-row">
      <span>Require Fingerprint / Device Unlock</span>
      <input id="deviceLockToggle" type="checkbox" onchange="setDeviceVerificationRequired(this.checked)" />
    </label>
    <div class="hint" id="deviceLockHint">Uses this browser's platform authenticator. Requires HTTPS.</div>
  </div>
  <div class="setting-group">
    <label>Status</label>
    <div id="settingsStatus" style="font-size:0.75rem"></div>
  </div>
</div>

<div class="view" id="agentListView">
  <div class="agents" id="agents"></div>
</div>

<div class="terminal-view" id="terminalView">
  <div class="term-header">
    <button class="back" onclick="closeTerminal()">‹</button>
    <span class="title" id="termTitle"></span>
    <button class="refresh-btn" onclick="refreshPane()">↻</button>
  </div>
  <div class="term-content" id="termContent" tabindex="-1">Loading…</div>
  <button class="jump-bottom" id="jumpBottomButton" onclick="jumpToTerminalBottom()" aria-label="Jump to latest output">↓</button>
  <div class="term-input">
    <button class="attach-btn" onclick="chooseImages()" aria-label="Attach image">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        <circle cx="8.5" cy="10" r="1.5"></circle>
        <path d="M21 15l-5-5L5 21"></path>
      </svg>
    </button>
    <div class="composer-field" id="composerField">
      <textarea id="termInput" rows="1" placeholder="Type…" autocomplete="on" autocorrect="on" autocapitalize="sentences" spellcheck="true" enterkeyhint="send" oninput="handleComposerInput()"></textarea>
      <button class="input-clear-btn" id="clearInputButton" onclick="clearPromptText()" aria-label="Clear prompt text">×</button>
    </div>
    <button class="send-btn" id="sendButton" onclick="submitPrompt()" aria-label="Send prompt" disabled>➤</button>
    <input id="imageInput" type="file" accept="image/*" multiple hidden onchange="uploadSelectedImages(this.files); this.value='';" />
  </div>
  <div class="upload-status" id="uploadStatus" aria-live="polite"></div>
  <div class="quick-actions" id="quickActions"></div>
  <div class="term-keys">
    <button onclick="cancelPrompt()">Esc</button>
    <button onclick="interruptPrompt()">^C</button>
    <button onclick="sendKey('Tab')">Tab</button>
    <span class="spacer"></span>
    <div class="arrow-toggle">
      <button onclick="toggleArrows(event)" aria-label="Arrow keys">⌨↕</button>
      <div class="arrow-popup" id="arrowPopup" onclick="event.stopPropagation()">
        <button class="empty"></button><button onclick="sendKey('Up')">↑</button><button class="empty"></button>
        <button onclick="sendKey('Left')">←</button><button onclick="sendKey('Enter')">⏎</button><button onclick="sendKey('Right')">→</button>
        <button class="empty"></button><button onclick="sendKey('Down')">↓</button><button class="empty"></button>
      </div>
    </div>
  </div>
</div>

<script src="notification-icons.js?v=4"></script>
<script>
const THEMES = ['dark','light','nord','solarized','rose'];
const TERMINAL_FONT_SIZES = ['compact','regular','large'];
const TERMINAL_HISTORY_LINES = 500;
const IMAGE_UPLOAD_MAX_BYTES = 10 * 1024 * 1024;
const APP_TITLE = '🐑 herdr';
const THEME_COLORS = {
  dark: '#0a0a0a',
  light: '#f5f5f5',
  nord: '#2e3440',
  solarized: '#002b36',
  rose: '#191724',
};
const TERMINAL_SEPARATOR_TOKEN = '\uE000HERDR_SEPARATOR\uE000';
const MENU_LINE_RE = /^\s*[❯›]?\s*\d+\.\s+.+$/;
const COMMAND_LINE_RE = /^\s*(?:[$>❯›])\s+(.+?)\s*$/;
const PROMPT_SKIP_RE = /^(?:bash command|do you want to proceed\??|would you like to run\b.*|environment:\s*\w+|press enter to confirm\b.*|esc to cancel\b.*)$/i;
const CODEX_STATUS_LINE_KEY = 'herdr_show_codex_status_line';
const DEVICE_LOCK_KEY = 'herdr_require_device_unlock';
const DEVICE_CREDENTIAL_KEY = 'herdr_device_unlock_credential';
const PUSH_ENABLED_KEY = 'herdr_push_enabled';
// Version query defeats CDN edge caching of the worker script: a changed URL is
// a guaranteed cache miss, so update checks always see the latest code. Bump
// whenever sw.js changes.
const SW_SCRIPT_URL = 'sw.js?v=4';
const PUSH_CLIENT_KEY = 'herdr_push_client_id';
const PUSH_VAPID_KEY_PREFIX = 'herdr_push_vapid_key_';
const ANSI_COLORS = {
  30: '#555', 31: '#ff5f5f', 32: '#5fd75f', 33: '#ffd75f',
  34: '#5fafff', 35: '#d75fff', 36: '#5fffff', 37: '#e5e5e5',
  90: '#777', 91: '#ff8080', 92: '#80ff80', 93: '#ffff80',
  94: '#80bfff', 95: '#ff80ff', 96: '#80ffff', 97: '#fff'
};
let relayConfigs = loadRelayConfigs(), connections = new Map(), agents = [], activePane = null, activePaneSnapshot = null, refreshInterval = null, lastAgentsSignature = '', currentView = 'agents', viewIndex = 0, lastInsertedBackspaces = 0;
let securityLocked = false, unlockInProgress = false, pendingConnectAll = false;
let lastBlockedPaneIds = new Set();
let respondingPaneIds = new Set();
let serviceWorkerRegistration = null;
let pushServiceWorkerRegistrations = new Map();
let notificationSyncing = false;
let notificationStopping = false;
let pendingNotificationTarget = null;
let pendingImageUploads = new Map();
let uploadStatusTimer = null;
let lastTerminalDisplayContent = '';

// Settings
const savedTheme = localStorage.getItem('herdr_theme') || 'nord';
const savedTerminalFontSize = localStorage.getItem('herdr_terminal_font_size') || localStorage.getItem('herdr_home_font_size') || 'compact';
applyTheme(savedTheme);
applyTerminalFontSize(savedTerminalFontSize);
registerServiceWorker();
renderCodexStatusLineSetting();
renderNotificationSetting();
renderDeviceVerificationSetting();
renderRelayList();

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('herdr_theme', t);
  renderThemeGrid();
  updateThemeColor();
}

function updateThemeColor() {
  const meta = document.querySelector('meta[name="theme-color"]');
  if (!meta) return;
  const theme = localStorage.getItem('herdr_theme') || 'dark';
  meta.setAttribute('content', THEME_COLORS[theme] || THEME_COLORS.dark);
}
function renderThemeGrid() {
  const cur = localStorage.getItem('herdr_theme') || 'dark';
  document.getElementById('themeGrid').innerHTML = THEMES.map(t =>
    `<button class="theme-btn ${t===cur?'active':''}" aria-pressed="${t===cur}" onclick="applyTheme('${t}')">${t===cur?'✓ ':''}${t}</button>`
  ).join('');
}
renderThemeGrid();

function applyTerminalFontSize(size) {
  const next = TERMINAL_FONT_SIZES.includes(size) ? size : 'compact';
  document.documentElement.setAttribute('data-terminal-font', next);
  localStorage.setItem('herdr_terminal_font_size', next);
  renderFontGrid();
}

function renderFontGrid() {
  const cur = localStorage.getItem('herdr_terminal_font_size') || localStorage.getItem('herdr_home_font_size') || 'compact';
  document.getElementById('fontGrid').innerHTML = TERMINAL_FONT_SIZES.map(size =>
    `<button class="font-btn ${size===cur?'active':''}" data-size="${size}" aria-pressed="${size===cur}" onclick="applyTerminalFontSize('${size}')">${size===cur?'✓ ':''}${size}</button>`
  ).join('');
}
renderFontGrid();

function isMobileViewport() {
  return window.matchMedia && window.matchMedia('(max-width: 767px)').matches;
}

function codexStatusLineVisible() {
  const saved = localStorage.getItem(CODEX_STATUS_LINE_KEY);
  if (saved !== null) return saved === 'true';
  return !isMobileViewport();
}

function setCodexStatusLineVisible(visible) {
  localStorage.setItem(CODEX_STATUS_LINE_KEY, visible ? 'true' : 'false');
  renderCodexStatusLineSetting();
  if (activePane) refreshPane();
}

function renderCodexStatusLineSetting() {
  const toggle = document.getElementById('codexStatusLineToggle');
  if (toggle) toggle.checked = codexStatusLineVisible();
}

function notificationsSupported() {
  return 'Notification' in window;
}

function pushSupported() {
  return notificationsSupported() && 'serviceWorker' in navigator && 'PushManager' in window;
}

function notificationsEnabled() {
  return notificationsSupported() && Notification.permission === 'granted';
}

function pushOptedIn() {
  if (!notificationsEnabled()) return false;
  return localStorage.getItem(PUSH_ENABLED_KEY) !== 'false';
}

async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) {
    renderNotificationSetting();
    return null;
  }
  try {
    serviceWorkerRegistration = await navigator.serviceWorker.register(SW_SCRIPT_URL);
    renderNotificationSetting();
    refreshPushSubscriptionState();
    return serviceWorkerRegistration;
  } catch (_err) {
    renderNotificationSetting();
    return null;
  }
}

function relayPushScope(relayId) {
  const slug = String(relayId || 'default').toLowerCase().replace(/[^a-z0-9-]+/g, '-').replace(/^-|-$/g, '') || 'relay';
  return `./push/${slug}/`;
}

function relayVapidStorageKey(relayId) {
  return `${PUSH_VAPID_KEY_PREFIX}${relayId}`;
}

function pushClientId() {
  let value = localStorage.getItem(PUSH_CLIENT_KEY);
  if (value) return value;
  if (window.crypto && crypto.randomUUID) value = crypto.randomUUID();
  else value = `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
  localStorage.setItem(PUSH_CLIENT_KEY, value);
  return value;
}

async function readyServiceWorker(relayId = null) {
  if (relayId) {
    if (pushServiceWorkerRegistrations.has(relayId)) return pushServiceWorkerRegistrations.get(relayId);
    if (!('serviceWorker' in navigator)) return null;
    try {
      const registration = await navigator.serviceWorker.register(SW_SCRIPT_URL, {scope: relayPushScope(relayId)});
      pushServiceWorkerRegistrations.set(relayId, registration);
      return registration;
    } catch (_err) {
      return null;
    }
  }
  if (serviceWorkerRegistration) return serviceWorkerRegistration;
  await registerServiceWorker();
  if (!('serviceWorker' in navigator)) return null;
  try {
    serviceWorkerRegistration = await navigator.serviceWorker.ready;
    return serviceWorkerRegistration;
  } catch (_err) {
    return null;
  }
}

function renderNotificationSetting() {
  const button = document.getElementById('notificationButton');
  const hint = document.getElementById('notificationHint');
  if (!button || !hint) return;

  if (!notificationsSupported()) {
    button.disabled = true;
    button.textContent = 'Notifications Unavailable';
    hint.textContent = 'This browser does not support page notifications.';
    return;
  }

  if (Notification.permission === 'granted') {
    if (!pushSupported()) {
      button.disabled = true;
      button.textContent = 'Notifications Enabled';
      hint.textContent = 'Background tabs can notify when this browser keeps the page alive.';
      return;
    }

    const relays = [...connections.values()];
    const connectedRelays = relays.filter(conn => conn.status === 'connected');
    const optedIn = pushOptedIn();
    const synced = relays.filter(conn => conn.pushStatus === 'subscribed').length;
    const browserSubscribed = relays.filter(conn => conn.pushStatus === 'browser-subscribed').length;
    const waiting = relays.some(conn => conn.pushStatus === 'sent');
    const failed = relays.some(conn => conn.pushStatus === 'failed');
    const missingConfig = relays.some(conn => conn.pushStatus === 'missing-config');
    const keyMismatch = relays.some(conn => conn.pushStatus === 'key-mismatch');
    const allSynced = optedIn && connectedRelays.length > 0 && synced === connectedRelays.length;
    button.disabled = notificationSyncing || notificationStopping || connectedRelays.length === 0;
    button.textContent = notificationStopping ? 'Stopping Push...' : notificationSyncing ? 'Syncing Push...' : allSynced ? 'Stop Push Notifications' : optedIn ? 'Sync Push Subscription' : 'Enable Push Notifications';
    if (notificationStopping) hint.textContent = 'Removing this browser push subscription from connected relays.';
    else if (notificationSyncing) hint.textContent = 'Sending this browser push subscription to connected relays.';
    else if (connectedRelays.length === 0) hint.textContent = 'Connect a relay before syncing push notifications.';
    else if (!optedIn) hint.textContent = 'Push notifications are stopped for this browser. Notification permission is still allowed in browser settings.';
    else if (missingConfig) hint.textContent = 'Waiting for the relay push key. Reconnect the relay if this stays here.';
    else if (keyMismatch) hint.textContent = 'This relay changed its push key. Tap Sync Push Subscription to refresh this device.';
    else if (failed) hint.textContent = 'Push subscription sync failed. Reconnect the relay and try again.';
    else if (waiting) hint.textContent = 'Push subscription sent; waiting for relay confirmation.';
    else if (allSynced) hint.textContent = `Push subscription synced with ${synced} relay${synced === 1 ? '' : 's'}.`;
    else if (synced) hint.textContent = `Push subscription synced with ${synced}/${connectedRelays.length} connected relays.`;
    else if (browserSubscribed) hint.textContent = 'This browser has an active push subscription. Sync it with the relay.';
    else hint.textContent = 'Push notifications can wake this app when an agent blocks.';
    return;
  }

  if (Notification.permission === 'denied') {
    button.disabled = true;
    button.textContent = 'Notifications Blocked';
    hint.textContent = 'Enable notifications in this browser site settings.';
    return;
  }

  button.disabled = false;
  button.textContent = 'Enable Notifications';
  hint.textContent = pushSupported()
    ? 'Required before closed-app push notifications can work.'
    : 'Required before background tabs can notify.';
}

async function toggleNotifications() {
  if (allConnectedRelaysPushSynced()) await stopPushNotifications();
  else await enableNotifications();
}

function allConnectedRelaysPushSynced() {
  const connectedRelays = [...connections.values()].filter(conn => conn.status === 'connected');
  return connectedRelays.length > 0 && connectedRelays.every(conn => conn.pushStatus === 'subscribed');
}

async function enableNotifications() {
  if (!notificationsSupported()) {
    renderNotificationSetting();
    return;
  }
  if (notificationSyncing) return;
  notificationSyncing = true;
  renderNotificationSetting();
  try {
    await Notification.requestPermission();
    if (notificationsEnabled()) {
      localStorage.setItem(PUSH_ENABLED_KEY, 'true');
      await readyServiceWorker();
      await registerAllPushSubscriptions();
    }
  } catch (_err) {}
  finally {
    notificationSyncing = false;
    renderNotificationSetting();
  }
}

async function stopPushNotifications() {
  if (!pushSupported() || notificationStopping) return;
  notificationStopping = true;
  renderNotificationSetting();
  try {
    localStorage.setItem(PUSH_ENABLED_KEY, 'false');
    await unsubscribeAllPushSubscriptions();
  } finally {
    notificationStopping = false;
    renderNotificationSetting();
    renderRelayList();
  }
}

function urlBase64ToUint8Array(value) {
  const padding = '='.repeat((4 - value.length % 4) % 4);
  const base64 = (value + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const output = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) output[i] = raw.charCodeAt(i);
  return output;
}

function uint8ArrayToUrlBase64(bytes) {
  let raw = '';
  for (const byte of bytes) raw += String.fromCharCode(byte);
  return btoa(raw).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}

function subscriptionApplicationServerKey(subscription) {
  const key = subscription && subscription.options && subscription.options.applicationServerKey;
  return key ? uint8ArrayToUrlBase64(new Uint8Array(key)) : '';
}

function subscriptionMatchesRelayKey(subscription, relayKey) {
  const actualKey = subscriptionApplicationServerKey(subscription);
  return Boolean(actualKey && relayKey && actualKey === relayKey);
}

async function registerAllPushSubscriptions() {
  const results = await Promise.all([...connections.keys()].map(id => registerPushSubscription(id)));
  return results.some(Boolean);
}

async function unsubscribeAllPushSubscriptions() {
  const results = await Promise.all([...connections.keys()].map(id => unsubscribePushSubscription(id)));
  const legacyEndpoint = await legacyPushEndpoint();
  if (legacyEndpoint) {
    const legacyRegistration = await readyServiceWorker();
    try {
      const legacySubscription = await legacyRegistration.pushManager.getSubscription();
      if (legacySubscription) await legacySubscription.unsubscribe();
    } catch (_err) {}
    for (const conn of connections.values()) {
      sendPushUnsubscribe(conn, [legacyEndpoint]);
    }
  }
  return results.some(Boolean) || Boolean(legacyEndpoint);
}

async function unsubscribePushSubscription(relayId) {
  const conn = connections.get(relayId);
  const relay = conn ? conn.relay : relayConfig(relayId);
  if (!relay) return false;
  const registration = await readyServiceWorker(relayId);
  const endpoints = [];
  try {
    const subscription = registration && registration.pushManager
      ? await registration.pushManager.getSubscription()
      : null;
    if (subscription) {
      endpoints.push(subscription.endpoint);
      await subscription.unsubscribe();
    }
  } catch (_err) {}
  sendPushUnsubscribe(conn, endpoints);
  localStorage.removeItem(relayVapidStorageKey(relayId));
  if (conn) setPushStatus(conn, '');
  return Boolean(endpoints.length);
}

async function unregisterRelayServiceWorker(relayId) {
  if (!('serviceWorker' in navigator)) return false;
  try {
    const registration = pushServiceWorkerRegistrations.get(relayId)
      || await navigator.serviceWorker.getRegistration(relayPushScope(relayId));
    pushServiceWorkerRegistrations.delete(relayId);
    return registration ? registration.unregister() : false;
  } catch (_err) {
    return false;
  }
}

function sendPushUnsubscribe(conn, endpoints) {
  if (!conn || !conn.ws || conn.ws.readyState !== 1) return false;
  conn.ws.send(JSON.stringify({
    type: 'push_unsubscribe',
    client_id: `${pushClientId()}:${conn.relay.id}`,
    endpoints: [...new Set(endpoints.filter(Boolean))],
  }));
  return true;
}

function setPushStatus(conn, status) {
  if (!conn || conn.pushStatus === status) return;
  conn.pushStatus = status;
  renderNotificationSetting();
  renderRelayList();
}

async function refreshPushSubscriptionState(relayId = null) {
  if (!pushSupported() || !notificationsEnabled()) return false;
  const targets = relayId ? [connections.get(relayId)].filter(Boolean) : [...connections.values()];
  let foundSubscription = false;
  for (const conn of targets) {
    const registration = await readyServiceWorker(conn.relay.id);
    if (!registration || !registration.pushManager) continue;
    try {
      const subscription = await registration.pushManager.getSubscription();
      const savedKey = localStorage.getItem(relayVapidStorageKey(conn.relay.id)) || '';
      if (!subscription) {
        if (['browser-subscribed', 'subscribed', 'sent'].includes(conn.pushStatus)) setPushStatus(conn, '');
        continue;
      }
      foundSubscription = true;
      const actualKey = subscriptionApplicationServerKey(subscription);
      if (conn.vapidPublicKey && actualKey && actualKey !== conn.vapidPublicKey) setPushStatus(conn, 'key-mismatch');
      else if (conn.vapidPublicKey && savedKey && savedKey !== conn.vapidPublicKey) setPushStatus(conn, 'key-mismatch');
      else if (!conn.pushStatus || conn.pushStatus === 'missing-config' || conn.pushStatus === 'failed') setPushStatus(conn, 'browser-subscribed');
    } catch (_err) {
      continue;
    }
  }
  return foundSubscription;
}

async function registerPushSubscription(relayId) {
  const conn = connections.get(relayId);
  if (!conn) return false;
  if (!conn.vapidPublicKey) {
    setPushStatus(conn, 'missing-config');
    return false;
  }
  if (!conn.ws || conn.ws.readyState !== 1) {
    setPushStatus(conn, 'failed');
    return false;
  }
  if (!pushSupported() || !notificationsEnabled()) return false;

  const registration = await readyServiceWorker(relayId);
  if (!registration) return false;

  try {
    let subscription = await registration.pushManager.getSubscription();
    const savedKey = localStorage.getItem(relayVapidStorageKey(relayId)) || '';
    const replaceEndpoints = [];
    const actualKey = subscriptionApplicationServerKey(subscription);
    if (subscription && actualKey && !subscriptionMatchesRelayKey(subscription, conn.vapidPublicKey)) {
      replaceEndpoints.push(subscription.endpoint);
      await subscription.unsubscribe();
      subscription = null;
    } else if (subscription && !actualKey && savedKey && savedKey !== conn.vapidPublicKey) {
      replaceEndpoints.push(subscription.endpoint);
      await subscription.unsubscribe();
      subscription = null;
    }
    if (!subscription) {
      subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(conn.vapidPublicKey),
      });
    }
    const legacyEndpoint = await legacyPushEndpoint();
    if (legacyEndpoint) replaceEndpoints.push(legacyEndpoint);
    localStorage.setItem(relayVapidStorageKey(relayId), conn.vapidPublicKey);
    conn.ws.send(JSON.stringify({
      type: 'push_subscribe',
      subscription: subscription.toJSON(),
      client_id: `${pushClientId()}:${relayId}`,
      replace_endpoints: [...new Set(replaceEndpoints)],
      user_agent: navigator.userAgent,
    }));
    setPushStatus(conn, 'sent');
    return true;
  } catch (_err) {
    setPushStatus(conn, 'failed');
    return false;
  }
}

async function legacyPushEndpoint() {
  if (!pushSupported()) return '';
  const registration = await readyServiceWorker();
  if (!registration || !registration.pushManager) return '';
  try {
    const subscription = await registration.pushManager.getSubscription();
    return subscription ? subscription.endpoint : '';
  } catch (_err) {
    return '';
  }
}

function deviceVerificationSupported() {
  return Boolean(window.PublicKeyCredential && navigator.credentials && window.isSecureContext);
}

function deviceVerificationEnabled() {
  return localStorage.getItem(DEVICE_LOCK_KEY) === 'true' && Boolean(localStorage.getItem(DEVICE_CREDENTIAL_KEY));
}

function renderDeviceVerificationSetting() {
  const toggle = document.getElementById('deviceLockToggle');
  const hint = document.getElementById('deviceLockHint');
  const enabled = deviceVerificationEnabled();
  if (toggle) toggle.checked = enabled;
  if (!hint) return;
  if (!deviceVerificationSupported()) {
    hint.textContent = 'Device verification needs HTTPS and a browser with WebAuthn support.';
  } else if (enabled) {
    hint.textContent = 'The app will ask for device verification on open, reload, and resume before reconnecting relays.';
  } else {
    hint.textContent = "Uses this browser's platform authenticator. Requires HTTPS.";
  }
}

async function setDeviceVerificationRequired(required) {
  if (!required) {
    localStorage.removeItem(DEVICE_LOCK_KEY);
    localStorage.removeItem(DEVICE_CREDENTIAL_KEY);
    securityLocked = false;
    pendingConnectAll = false;
    hideLockScreen();
    renderDeviceVerificationSetting();
    return;
  }
  await enrollDeviceVerification();
}

async function enrollDeviceVerification() {
  renderDeviceVerificationSetting();
  if (!deviceVerificationSupported()) {
    showDeviceLockHint('Device verification needs HTTPS and WebAuthn support.');
    renderDeviceVerificationSetting();
    return false;
  }
  try {
    showDeviceLockHint('Creating a device verification credential...');
    const credential = await navigator.credentials.create({
      publicKey: {
        challenge: randomBytes(32),
        rp: { name: 'Herdr Mobile Relay' },
        user: {
          id: randomBytes(16),
          name: 'local-device',
          displayName: 'This device',
        },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },
          { type: 'public-key', alg: -257 },
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
        },
        timeout: 60000,
        attestation: 'none',
      },
    });
    if (!credential || !credential.rawId) throw new Error('No credential returned');
    localStorage.setItem(DEVICE_CREDENTIAL_KEY, base64UrlEncode(credential.rawId));
    localStorage.setItem(DEVICE_LOCK_KEY, 'true');
    showDeviceLockHint('Device verification is enabled.');
    renderDeviceVerificationSetting();
    return true;
  } catch (_err) {
    localStorage.removeItem(DEVICE_LOCK_KEY);
    localStorage.removeItem(DEVICE_CREDENTIAL_KEY);
    showDeviceLockHint('Device verification was cancelled or failed.');
    renderDeviceVerificationSetting();
    return false;
  }
}

function showDeviceLockHint(message) {
  const hint = document.getElementById('deviceLockHint');
  if (hint) hint.textContent = message;
}

function randomBytes(length) {
  const bytes = new Uint8Array(length);
  crypto.getRandomValues(bytes);
  return bytes;
}

function base64UrlEncode(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  for (const byte of bytes) binary += String.fromCharCode(byte);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}

function base64UrlDecode(value) {
  const base64 = value.replace(/-/g, '+').replace(/_/g, '/');
  const padded = base64.padEnd(Math.ceil(base64.length / 4) * 4, '=');
  const binary = atob(padded);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function startAppConnections() {
  if (deviceVerificationEnabled() && securityLocked) {
    pendingConnectAll = true;
    showLockScreen('open');
    return;
  }
  if (relayConfigs.length) setTimeout(connectAll, 100);
  else showSetup();
}

function showLockScreen(reason = 'open') {
  const screen = document.getElementById('lockScreen');
  const desc = document.getElementById('lockDescription');
  if (desc) {
    desc.textContent = reason === 'resume'
      ? 'Verify before reconnecting relays after the page was paused.'
      : 'Verify with your device fingerprint, face unlock, or passcode before connecting to relays.';
  }
  if (screen) screen.classList.add('active');
}

function hideLockScreen() {
  const screen = document.getElementById('lockScreen');
  if (screen) screen.classList.remove('active');
  setLockStatus('');
}

function setLockStatus(message) {
  const status = document.getElementById('lockStatus');
  if (status) status.textContent = message;
}

function lockForDevice(reason = 'resume') {
  if (!deviceVerificationEnabled() || securityLocked) return;
  securityLocked = true;
  pendingConnectAll = true;
  for (const id of [...connections.keys()]) disconnectRelay(id);
  updateStatusDot();
  renderRelayList();
  showLockScreen(reason);
}

async function requireDeviceUnlock(reason = 'open') {
  if (!deviceVerificationEnabled()) return true;
  securityLocked = true;
  pendingConnectAll = true;
  showLockScreen(reason);
  return unlockWithDevice(reason);
}

async function unlockWithDevice(reason = 'manual') {
  if (!deviceVerificationEnabled()) {
    unlockSucceeded();
    return true;
  }
  if (!deviceVerificationSupported()) {
    showLockScreen(reason);
    setLockStatus('Device verification needs HTTPS and WebAuthn support.');
    return false;
  }
  if (unlockInProgress) return false;
  const credentialId = localStorage.getItem(DEVICE_CREDENTIAL_KEY);
  if (!credentialId) {
    setLockStatus('No device credential is enrolled. Disable and re-enable the setting.');
    renderDeviceVerificationSetting();
    return false;
  }
  unlockInProgress = true;
  showLockScreen(reason);
  setLockStatus('Waiting for device verification...');
  try {
    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge: randomBytes(32),
        allowCredentials: [{ type: 'public-key', id: base64UrlDecode(credentialId) }],
        userVerification: 'required',
        timeout: 60000,
      },
    });
    if (!assertion) throw new Error('No assertion returned');
    unlockSucceeded();
    return true;
  } catch (_err) {
    setLockStatus('Verification was cancelled or failed. Tap Unlock to try again.');
    return false;
  } finally {
    unlockInProgress = false;
  }
}

function unlockSucceeded() {
  securityLocked = false;
  const shouldConnect = pendingConnectAll;
  pendingConnectAll = false;
  hideLockScreen();
  renderDeviceVerificationSetting();
  if (shouldConnect) connectAll();
  else {
    updateStatusDot();
    renderRelayList();
  }
}

function loadRelayConfigs() {
  const raw = localStorage.getItem('herdr_relays');
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) return parsed.filter(r => r && r.url).map(normalizeRelayConfig);
    } catch (_e) {}
  }
  const legacyUrl = localStorage.getItem('herdr_relay_url') || '';
  if (!legacyUrl) return [];
  const relay = normalizeRelayConfig({
    url: legacyUrl,
    token: localStorage.getItem('herdr_relay_token') || '',
    label: relayLabelFromUrl(legacyUrl),
  });
  localStorage.setItem('herdr_relays', JSON.stringify([relay]));
  return [relay];
}

function normalizeRelayConfig(relay) {
  const url = (relay.url || '').trim();
  const label = (relay.label || relayLabelFromUrl(url)).trim();
  return {
    id: relay.id || makeRelayId(label, url),
    label,
    url,
    token: relay.token || '',
  };
}

function makeRelayId(label, url) {
  return `${label || relayLabelFromUrl(url)}-${url}`.toLowerCase()
    .replace(/^wss?:\/\//, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '')
    .slice(0, 48) || 'relay';
}

function relayLabelFromUrl(url) {
  try {
    const host = new URL(url).hostname;
    return host.split('.')[0] || 'relay';
  } catch (_e) {
    return 'relay';
  }
}

function saveRelayConfigs() {
  localStorage.setItem('herdr_relays', JSON.stringify(relayConfigs));
}

function relayConfig(id) {
  return relayConfigs.find(r => r.id === id);
}

function relayLabel(id) {
  const relay = relayConfig(id);
  return relay ? relay.label : 'relay';
}

function addRelay() {
  const labelInput = document.getElementById('relayLabel');
  const urlInput = document.getElementById('relayUrl');
  const tokenInput = document.getElementById('relayToken');
  const url = urlInput.value.trim();
  if (!url) return;
  const existing = relayConfigs.find(r => r.url === url);
  const next = normalizeRelayConfig({
    id: existing && existing.id,
    label: labelInput.value.trim() || relayLabelFromUrl(url),
    url,
    token: tokenInput.value.trim(),
  });
  if (existing) relayConfigs = relayConfigs.map(r => r.id === existing.id ? next : r);
  else relayConfigs = [...relayConfigs, next];
  saveRelayConfigs();
  labelInput.value = '';
  urlInput.value = '';
  tokenInput.value = '';
  renderRelayList();
  connectAll();
}

async function removeRelay(id) {
  await unsubscribePushSubscription(id);
  await unregisterRelayServiceWorker(id);
  disconnectRelay(id);
  relayConfigs = relayConfigs.filter(r => r.id !== id);
  saveRelayConfigs();
  removeAgentsForRelay(id);
  renderRelayList();
  render();
  updateStatusDot();
}

function renderRelayList() {
  const el = document.getElementById('relayList');
  if (!el) return;
  if (!relayConfigs.length) {
    el.innerHTML = '<div class="hint">No relays configured.</div>';
    updateSettingsStatus();
    return;
  }
  el.innerHTML = relayConfigs.map(relay => {
    const conn = connections.get(relay.id);
    const status = conn ? conn.status : 'disconnected';
    const color = status === 'connected' ? 'var(--green)' : status === 'connecting' ? 'var(--orange)' : 'var(--red)';
    const push = pushStatusMeta(conn);
    const idArg = escapeHtml(JSON.stringify(relay.id));
    return `<div class="relay-row">
      <span class="dot" style="background:${color}"></span>
      <div class="info">
        <div class="name">${escapeHtml(relay.label)}</div>
        <div class="url">${escapeHtml(relay.url)}</div>
        <div class="push-state" title="${escapeHtml(push.title)}"><span class="mini-dot" style="background:${push.color}"></span>${escapeHtml(push.label)}</div>
      </div>
      <button class="danger" onclick='removeRelay(${idArg})'>Remove</button>
    </div>`;
  }).join('');
  updateSettingsStatus();
}

function pushStatusMeta(conn) {
  if (!pushSupported()) return {label: 'Push unsupported', color: 'var(--muted)', title: 'This browser cannot use Web Push.'};
  if (!notificationsEnabled()) return {label: 'Push off', color: 'var(--muted)', title: 'Notifications are not enabled for this site.'};
  if (!pushOptedIn()) return {label: 'Push stopped', color: 'var(--muted)', title: 'Push notifications are stopped for this browser.'};
  if (!conn || conn.status !== 'connected') return {label: 'Push offline', color: 'var(--muted)', title: 'Connect the relay to sync push notifications.'};
  if (conn.pushStatus === 'subscribed') return {label: 'Push synced', color: 'var(--green)', title: 'This relay confirmed the current browser push subscription.'};
  if (conn.pushStatus === 'browser-subscribed') return {label: 'Push enabled', color: 'var(--yellow)', title: 'This browser has a push subscription; sync it with the relay.'};
  if (conn.pushStatus === 'sent') return {label: 'Push syncing', color: 'var(--blue)', title: 'Subscription sent; waiting for relay confirmation.'};
  if (conn.pushStatus === 'missing-config') return {label: 'Push waiting', color: 'var(--yellow)', title: 'Waiting for the relay VAPID public key.'};
  if (conn.pushStatus === 'key-mismatch') return {label: 'Push key mismatch', color: 'var(--orange)', title: 'This relay changed its push key; sync again to refresh this device.'};
  if (conn.pushStatus === 'failed') return {label: 'Push failed', color: 'var(--red)', title: 'The last push subscription sync failed.'};
  return {label: 'Push not synced', color: 'var(--muted)', title: 'Tap Sync Push Subscription to register this device with the relay.'};
}

function toggleSettings() {
  if (currentView === 'settings') closeCurrentView();
  else navigateTo({view: 'settings'});
}

function updateSettingsStatus() {
  const total = relayConfigs.length;
  const connected = [...connections.values()].filter(c => c.status === 'connected').length;
  const connecting = [...connections.values()].filter(c => c.status === 'connecting').length;
  const color = connected ? 'var(--green)' : connecting ? 'var(--orange)' : 'var(--red)';
  const text = total ? `${connected}/${total} relays connected · ${agents.length} agents` : 'No relays configured';
  document.getElementById('settingsStatus').innerHTML = `<span style="color:${color}">●</span> ${text}`;
}

function viewUrl(state) {
  if (state.view === 'settings') return '#settings';
  if (state.view === 'terminal') return `#pane=${encodeURIComponent(state.paneId)}`;
  if (state.view === 'notification' && state.target) return `#notify=${encodeURIComponent(JSON.stringify(state.target))}`;
  return location.pathname + location.search;
}

function navigateTo(state) {
  viewIndex += 1;
  history.pushState({herdrView: true, index: viewIndex, ...state}, '', viewUrl(state));
  applyView(state);
}

function replaceView(state) {
  history.replaceState({herdrView: true, index: viewIndex, ...state}, '', viewUrl(state));
  applyView(state);
}

function closeCurrentView() {
  if (currentView === 'agents') return;
  if (viewIndex > 0 && history.state && history.state.herdrView && history.state.view === currentView) {
    history.back();
  } else {
    replaceView({view: 'agents'});
  }
}

function applyView(state) {
  if (state.view === 'settings') showSettingsView();
  else if (state.view === 'terminal' && state.paneId) showTerminalView(state.paneId);
  else if (state.view === 'notification' && state.target) openNotificationTarget(state.target);
  else showAgentListView();
}

function showAgentListView() {
  currentView = 'agents';
  activePane = null;
  activePaneSnapshot = null;
  clearInterval(refreshInterval);
  updateAppChrome();
  document.getElementById('settingsView').style.display = 'none';
  document.getElementById('terminalView').classList.remove('active', 'has-quick-actions');
  document.getElementById('agentListView').style.display = '';
}

function showSettingsView() {
  currentView = 'settings';
  activePane = null;
  activePaneSnapshot = null;
  clearInterval(refreshInterval);
  updateAppChrome('Settings');
  document.getElementById('terminalView').classList.remove('active', 'has-quick-actions');
  document.getElementById('agentListView').style.display = 'none';
  document.getElementById('settingsView').style.display = 'block';
  renderNotificationSetting();
  renderRelayList();
  updateSettingsStatus();
}

function stateFromLocation() {
  if (location.hash === '#settings') return {view: 'settings'};
  const paneMatch = location.hash.match(/^#pane=(.+)$/);
  if (paneMatch) return {view: 'terminal', paneId: decodeURIComponent(paneMatch[1])};
  const notifyMatch = location.hash.match(/^#notify=(.+)$/);
  if (notifyMatch) {
    const target = parseNotificationTarget(notifyMatch[1]);
    if (target) return {view: 'notification', target};
  }
  return {view: 'agents'};
}

function routeNotificationUrl(url) {
  try {
    const target = new URL(url, location.href);
    if (target.origin !== location.origin || !target.hash) return;
    if (location.hash !== target.hash) {
      location.hash = target.hash;
      return;
    }
    applyView(stateFromLocation());
  } catch (_err) {}
}

function parseNotificationTarget(value) {
  try {
    const parsed = JSON.parse(decodeURIComponent(value));
    const paneId = String(parsed && parsed.pane_id || '').trim();
    const host = String(parsed && parsed.host || '').trim();
    if (!paneId) return null;
    return {pane_id: paneId, host};
  } catch (_err) {
    return null;
  }
}

function openNotificationTarget(target) {
  const agent = resolveNotificationTarget(target);
  if (agent) {
    pendingNotificationTarget = null;
    replaceView({view: 'terminal', paneId: agent.pane_id});
    return;
  }
  pendingNotificationTarget = target;
  showAgentListView();
}

function resolveNotificationTarget(target) {
  if (!target || !target.pane_id) return null;
  const matches = agents.filter(agent => agent.raw_pane_id === target.pane_id);
  if (!matches.length) return null;
  const host = String(target.host || '').toLowerCase();
  if (host) {
    const exact = matches.find(agent => [
      agent.host,
      hostLabel(agent),
      agent.relay_label,
    ].some(value => String(value || '').toLowerCase() === host));
    if (exact) return exact;
  }
  return matches.length === 1 ? matches[0] : null;
}

function resolvePendingNotificationTarget() {
  if (!pendingNotificationTarget) return;
  const agent = resolveNotificationTarget(pendingNotificationTarget);
  if (agent) {
    pendingNotificationTarget = null;
    replaceView({view: 'terminal', paneId: agent.pane_id});
  }
}

// Connection
function connectAll() {
  if (deviceVerificationEnabled() && securityLocked) {
    pendingConnectAll = true;
    showLockScreen('open');
    return;
  }
  for (const id of [...connections.keys()]) disconnectRelay(id);
  connections.clear();
  agents = [];
  lastAgentsSignature = '';
  if (!relayConfigs.length) {
    updateStatusDot();
    showSetup();
    renderRelayList();
    return;
  }
  render();
  for (const relay of relayConfigs) connectRelay(relay);
}

function connectRelay(relay) {
  if (deviceVerificationEnabled() && securityLocked) {
    pendingConnectAll = true;
    showLockScreen('open');
    return;
  }
  disconnectRelay(relay.id);
  const conn = { relay, ws: null, status: 'connecting', reconnectTimer: null, closed: false };
  connections.set(relay.id, conn);
  updateStatusDot();
  renderRelayList();
  let wsUrl = relay.url;
  if (relay.token) wsUrl += (relay.url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(relay.token);
  const ws = new WebSocket(wsUrl);
  conn.ws = ws;
  ws.onopen = () => {
    conn.status = 'connected';
    updateStatusDot();
    renderRelayList();
    refreshPushSubscriptionState(relay.id);
    const target = activePaneTarget();
    if (target && target.relay_id === relay.id) refreshPane();
  };
  ws.onclose = () => {
    conn.status = 'disconnected';
    removeAgentsForRelay(relay.id);
    updateStatusDot();
    renderRelayList();
    if (!conn.closed && deviceVerificationEnabled() && document.visibilityState !== 'visible') {
      lockForDevice('resume');
      return;
    }
    if (!conn.closed && !securityLocked) conn.reconnectTimer = setTimeout(() => connectRelay(relay), 3000);
  };
  ws.onerror = () => {
    conn.status = 'disconnected';
    updateStatusDot();
    renderRelayList();
  };
  ws.onmessage = (e) => {
    try {
      handleMessage(relay.id, JSON.parse(e.data));
    } catch (_err) {}
  };
}

function disconnectRelay(id) {
  const conn = connections.get(id);
  if (!conn) return;
  conn.closed = true;
  if (conn.reconnectTimer) clearTimeout(conn.reconnectTimer);
  if (conn.ws) conn.ws.close();
  connections.delete(id);
}

function updateStatusDot() {
  const dot = document.getElementById('statusDot');
  const states = [...connections.values()].map(c => c.status);
  const connected = states.includes('connected');
  const connecting = states.includes('connecting');
  dot.style.background = connected ? 'var(--green)' : connecting ? 'var(--orange)' : 'var(--red)';
  updateSettingsStatus();
}

function showSetup() {
  document.getElementById('agents').innerHTML = `<div class="empty">
    <p style="font-size:1.5rem;margin-bottom:12px">🐑</p>
    <p><strong>Herdr Mobile Relay</strong></p>
    <p style="margin-top:8px">Monitor & approve agents from your phone</p>
    <p style="margin-top:16px;font-size:0.75rem;color:var(--muted);text-align:left;max-width:280px;margin-left:auto;margin-right:auto">
      <strong>Connect your own:</strong><br>
      1. Run a relay on each computer<br>
      2. Give each computer its own wss:// URL<br>
      3. Tap ⚙ → add each relay URL<br>
    </p>
  </div>`;
}

function handleMessage(relayId, msg) {
  if (msg.type === 'push_config') {
    const conn = connections.get(relayId);
    if (conn) {
      conn.vapidPublicKey = msg.vapid_public_key || '';
      if (pushOptedIn()) registerPushSubscription(relayId);
      else refreshPushSubscriptionState(relayId);
      renderNotificationSetting();
      renderRelayList();
    }
  }
  else if (msg.type === 'push_subscribed') {
    const conn = connections.get(relayId);
    if (conn) {
      setPushStatus(conn, msg.ok ? 'subscribed' : 'failed');
    }
  }
  else if (msg.type === 'push_unsubscribed') {
    const conn = connections.get(relayId);
    if (conn && msg.ok) setPushStatus(conn, '');
  }
  else if (msg.type === 'upload_result') {
    handleUploadResult(relayId, msg);
  }
  else if (msg.type === 'agents') {
    const nextAgents = mergeAgentList(relayId, (msg.agents || []).map(a => normalizeAgent(relayId, a)));
    const nextSignature = agentsSignature(nextAgents);
    const wasActivePaneMissing = currentView === 'terminal' && activePane && !activeAgent();
    agents = nextAgents;
    const respondingChanged = reconcileRespondingPanes();
    if (nextSignature !== lastAgentsSignature || respondingChanged) {
      lastAgentsSignature = nextSignature;
      render();
    }
    syncActiveTerminal(wasActivePaneMissing);
    resolvePendingNotificationTarget();
  }
  else if (msg.type === 'blocked') {
    const next = normalizeAgent(relayId, {...msg, status: 'blocked'});
    const a = agents.find(x => x.pane_id === next.pane_id);
    if (a) Object.assign(a, mergeAgentDetails(a, {...next, prompt: msg.prompt, command: msg.command, options: msg.options}));
    else agents.push(next);
    respondingPaneIds.delete(next.pane_id);
    lastAgentsSignature = agentsSignature(agents);
    render();
    syncActiveTerminal();
    resolvePendingNotificationTarget();
  } else if (msg.type === 'agent_update' && msg.pane_id) {
    const next = normalizeAgent(relayId, msg);
    const a = agents.find(x => x.pane_id === next.pane_id);
    if (a) Object.assign(a, mergeAgentDetails(a, next));
    else agents.push(next);
    reconcileRespondingPanes();
    lastAgentsSignature = agentsSignature(agents);
    render();
    syncActiveTerminal();
    resolvePendingNotificationTarget();
  } else if (msg.type === 'pane_content' && clientPaneId(relayId, msg.pane_id) === activePane) {
    updateTerminalContent(msg.content || '(empty)', msg.format);
  }
}

function normalizeAgent(relayId, agent) {
  const relay = relayConfig(relayId);
  const rawPaneId = agent.raw_pane_id || agent.pane_id || '';
  return {
    ...agent,
    relay_id: relayId,
    relay_label: relay ? relay.label : 'relay',
    raw_pane_id: rawPaneId,
    pane_id: clientPaneId(relayId, rawPaneId),
  };
}

function clientPaneId(relayId, rawPaneId) {
  return `${relayId}::${rawPaneId}`;
}

function mergeAgentList(relayId, nextAgents) {
  const previousById = new Map(agents.map(a => [a.pane_id, a]));
  const retained = agents.filter(a => a.relay_id !== relayId);
  const merged = nextAgents.map(next => {
    const previous = previousById.get(next.pane_id);
    return mergeAgentDetails(previous, next);
  });
  return retained.concat(merged);
}

function mergeAgentDetails(previous, next) {
  if (!previous) return next;
  const keepBlockedDetails = next.status === 'blocked';
  return {
    ...previous,
    ...next,
    tab_id: next.tab_id || previous.tab_id || '',
    tab_label: next.tab_label || previous.tab_label || '',
    tab_number: next.tab_number ?? previous.tab_number,
    workspace_id: next.workspace_id || previous.workspace_id || '',
    prompt: keepBlockedDetails ? (next.prompt ?? previous.prompt) : next.prompt,
    command: keepBlockedDetails ? (next.command ?? previous.command) : next.command,
    options: keepBlockedDetails ? (next.options ?? previous.options) : next.options,
  };
}

function removeAgentsForRelay(relayId) {
  const active = activePaneTarget();
  agents = agents.filter(a => a.relay_id !== relayId);
  lastAgentsSignature = agentsSignature(agents);
  render();
  if (currentView === 'terminal' && active && active.relay_id === relayId) syncTerminalChrome(null);
}

function agentsSignature(list) {
  return JSON.stringify(list.map(a => [
    a.relay_id, a.pane_id, a.raw_pane_id, a.tab_id, a.tab_label, a.tab_number,
    a.agent, a.status, a.project, a.cwd, a.host, a.prompt, a.command, a.options
  ]));
}

function updateTerminalContent(content, format) {
  const term = document.getElementById('termContent');
  const displayContent = compactSeparatorLines(terminalDisplayContent(content));
  const distanceFromBottom = term.scrollHeight - term.scrollTop - term.clientHeight;
  const shouldStickToBottom = distanceFromBottom < 48;
  const previousScrollTop = term.scrollTop;
  const contentChanged = displayContent !== lastTerminalDisplayContent;
  if (format === 'ansi') term.innerHTML = terminalHtml(displayContent);
  else term.textContent = displayContent.replaceAll(TERMINAL_SEPARATOR_TOKEN, '────────');
  if (shouldStickToBottom) {
    term.scrollTop = term.scrollHeight;
    hideJumpToBottom();
  } else {
    term.scrollTop = previousScrollTop;
    if (contentChanged) showJumpToBottom();
  }
  lastTerminalDisplayContent = displayContent;
}

function terminalDisplayContent(content) {
  if (codexStatusLineVisible()) return content;
  return String(content ?? '').split('\n').filter(line => !isAgentStatusLine(line)).join('\n');
}

function isAgentStatusLine(line) {
  return isCodexStatusLine(line) || isClaudeStatusLine(line);
}

function isCodexStatusLine(line) {
  const clean = stripAnsi(line).replace(/\s+/g, ' ').trim();
  return /\bContext\s+\d+%\s+used\b/i.test(clean) && /\bgpt[-\w.]*/i.test(clean);
}

function isClaudeStatusLine(line) {
  const clean = stripAnsi(line).replace(/\s+/g, ' ').trim();
  const hasClaudeModel = /\b(claude|sonnet|opus|haiku|fable|mythos)\b/i.test(clean);
  const looksLikeStatusBar = /[·|•]/.test(clean) || /(^|\s)[.~]?\//.test(clean);
  return /\bctx\s+\d+%\b/i.test(clean) && (hasClaudeModel || looksLikeStatusBar);
}

function compactSeparatorLines(content) {
  const out = [];
  let inSeparatorRun = false;
  for (const line of String(content ?? '').split('\n')) {
    if (isSeparatorOnlyLine(line)) {
      if (!inSeparatorRun) out.push(TERMINAL_SEPARATOR_TOKEN);
      inSeparatorRun = true;
      continue;
    }
    out.push(line);
    inSeparatorRun = false;
  }
  return out.join('\n');
}

function isSeparatorOnlyLine(line) {
  const clean = stripAnsi(line).replace(/\s+/g, '');
  return clean.length >= 8 && /^[\-=*_─━]+$/.test(clean);
}

function stripAnsi(text) {
  return String(text ?? '').replace(/\x1b\[[0-9;?]*[ -/]*[@-~]/g, '');
}

function escapeHtml(text) {
  return String(text ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function ansiToHtml(text) {
  let html = '', open = false, styles = {};
  const parts = text.split(/\x1b\[([0-9;]*)m/g);
  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      html += escapeHtml(parts[i]);
      continue;
    }
    if (open) {
      html += '</span>';
      open = false;
    }
    const codes = parts[i] ? parts[i].split(';').map(Number) : [0];
    if (codes.includes(0)) styles = {};
    for (let j = 0; j < codes.length; j++) {
      const code = codes[j];
      if (code === 1) styles.fontWeight = '700';
      else if (code === 2) styles.opacity = '0.7';
      else if (code === 3) styles.fontStyle = 'italic';
      else if (code === 4) styles.textDecoration = 'underline';
      else if (code === 22) delete styles.fontWeight;
      else if (code === 23) delete styles.fontStyle;
      else if (code === 24) delete styles.textDecoration;
      else if (code === 39) delete styles.color;
      else if (code === 49) delete styles.backgroundColor;
      else if ((code === 38 || code === 48) && codes[j + 1] === 2 && codes.length > j + 4) {
        const color = `rgb(${codes[j + 2]},${codes[j + 3]},${codes[j + 4]})`;
        if (code === 38) styles.color = color;
        else styles.backgroundColor = color;
        j += 4;
      }
      else if (ANSI_COLORS[code]) styles.color = ANSI_COLORS[code];
      else if (ANSI_COLORS[code - 10]) styles.backgroundColor = ANSI_COLORS[code - 10];
    }
    const style = Object.entries(styles).map(([k,v]) => `${k}:${v}`).join(';');
    if (style) {
      html += `<span style="${style}">`;
      open = true;
    }
  }
  if (open) html += '</span>';
  return html;
}

function terminalHtml(text) {
  return ansiToHtml(text).replaceAll(TERMINAL_SEPARATOR_TOKEN, '<span class="term-separator" aria-hidden="true"></span>');
}

function hostLabel(agent) {
  return agent.relay_label || relayLabel(agent.relay_id);
}

function tabLabel(agent) {
  const label = String(agent.tab_label || '').trim();
  if (label) return label;
  return agent.tab_number ? `tab ${agent.tab_number}` : '';
}

function displayName(agent) {
  const name = agent.project || agent.agent || 'agent';
  const tab = tabLabel(agent);
  return tab ? `${name} · ${tab}` : name;
}

function sortedAgents(list) {
  return [...list].sort((a, b) =>
    hostLabel(a).localeCompare(hostLabel(b)) ||
    tabLabel(a).localeCompare(tabLabel(b)) ||
    (a.project || a.agent || '').localeCompare(b.project || b.agent || '') ||
    (a.agent || '').localeCompare(b.agent || '')
  );
}

function agentCountLabel() {
  if (!relayConfigs.length) return '';
  const connected = [...connections.values()].filter(c => c.status === 'connected').length;
  const relayText = `${connected}/${relayConfigs.length} relays`;
  return agents.length ? `${relayText} · ${agents.length}` : relayText;
}

function agentStatusGroup(agent) {
  const status = String(agent && agent.status || 'unknown').trim().toLowerCase().replace(/[_-]+/g, ' ');
  if (status.includes('blocked')) return 'blocked';
  if (status.includes('working') || status.includes('running') || status.includes('progress') || status.includes('busy')) return 'working';
  if (
    status === 'idle' ||
    status === 'ready' ||
    status.includes('done') ||
    status.includes('complete') ||
    status.includes('finish') ||
    status.includes('success') ||
    status.includes('unread')
  ) return 'ready';
  return 'other';
}

function updateBlockedIndicators(blocked) {
  const count = blocked.length;
  document.title = count ? `(${count}) ${APP_TITLE}` : APP_TITLE;
  updateAppBadge(count);

  const paneIds = new Set(blocked.map(a => a.pane_id));
  const addedAgents = blocked.filter(a => !lastBlockedPaneIds.has(a.pane_id));
  if (addedAgents.length) {
    if (navigator.vibrate) navigator.vibrate([120, 80, 120]);
    for (const agent of addedAgents) notifyBlockedAgent(agent);
  }
  lastBlockedPaneIds = paneIds;
}

function updateAppBadge(count) {
  if (count > 0 && navigator.setAppBadge) {
    navigator.setAppBadge(count).catch(() => {});
    return;
  }
  if (navigator.clearAppBadge) navigator.clearAppBadge().catch(() => {});
}

function notifyBlockedAgent(agent) {
  if (!notificationsEnabled()) return;
  if (document.visibilityState === 'visible' && document.hasFocus()) return;
  if (pushDeliveryActiveForRelay(agent.relay_id)) return;
  const title = `${displayName(agent)} blocked`;
  const body = approvalPromptPreview(agent) || `${agent.agent || 'Agent'} needs approval`;
  showHerdrNotification(title, {
    body,
    tag: notificationTag(agent),
    renotify: true,
    icon: HERDR_NOTIFICATION_ICON,
    badge: HERDR_NOTIFICATION_BADGE,
    data: {
      url: viewUrl({view: 'terminal', paneId: agent.pane_id}),
      paneId: agent.pane_id,
    },
  });
}

function pushDeliveryActiveForRelay(relayId) {
  if (!pushOptedIn()) return false;
  const conn = connections.get(relayId);
  return Boolean(conn && ['sent', 'subscribed'].includes(conn.pushStatus));
}

function notificationTag(agent) {
  const host = agent.host || hostLabel(agent);
  const paneId = agent.raw_pane_id || agent.pane_id;
  return `herdr-${host}-${paneId}`;
}

async function showHerdrNotification(title, options) {
  try {
    const registration = await readyServiceWorker();
    if (registration && registration.showNotification) {
      await registration.showNotification(title, options);
      return;
    }
  } catch (_err) {}

  try {
    const notification = new Notification(title, options);
    notification.onclick = () => {
      window.focus();
      if (options.data && options.data.paneId) openTerminal(options.data.paneId);
      notification.close();
    };
  } catch (_err) {}
}

function reconcileRespondingPanes() {
  const blockedPaneIds = new Set(agents.filter(a => agentStatusGroup(a) === 'blocked').map(a => a.pane_id));
  let changed = false;
  for (const paneId of [...respondingPaneIds]) {
    if (!blockedPaneIds.has(paneId)) {
      respondingPaneIds.delete(paneId);
      changed = true;
    }
  }
  return changed;
}

function markPaneResponding(paneId) {
  if (!paneId) return;
  respondingPaneIds.add(paneId);
  render();
  syncActiveTerminal();
  setTimeout(() => {
    if (!respondingPaneIds.delete(paneId)) return;
    render();
    syncActiveTerminal();
  }, 5000);
}

function approvalOptions(agent) {
  const opts = Array.isArray(agent && agent.options) ? agent.options.filter(Boolean) : [];
  if (opts.length) return opts;
  if (agentStatusGroup(agent) === 'blocked') return ['yes, single permission','trust, always allow','no (tab to edit)'];
  return [];
}

function normalizeInlineText(text) {
  return String(text ?? '').replace(/\s+/g, ' ').trim();
}

function cleanPromptLine(line) {
  return normalizeInlineText(stripAnsi(line).replace(/^[│|]\s*/, '').replace(/\s*[│|]$/, ''));
}

function approvalButtonLabel(option, maxLength = 0) {
  const label = normalizeInlineText(option) || 'Option';
  if (maxLength && label.length > maxLength) return `${label.slice(0, maxLength - 3)}...`;
  return label;
}

function approvalButtonClass(option, index, total) {
  const value = approvalButtonLabel(option).toLowerCase();
  if (index === total - 1 || /\b(no|deny|reject|cancel|exit)\b/.test(value)) return 'btn-no';
  if (/\bapprove all\b/.test(value)) return 'btn-yes';
  if (/\b(always|trust|don't ask|dont ask)\b/.test(value)) return 'btn-trust';
  if (/\b(yes|approve|allow|proceed|confirm)\b/.test(value)) return 'btn-yes';
  if (/\b(configure|edit|amend)\b/.test(value)) return 'btn-trust';
  return 'btn-yes';
}

function approvalPromptPreview(agent) {
  const command = normalizeInlineText(agent && agent.command);
  if (command) return command;

  let commandFallback = '';
  let fallback = '';
  for (const rawLine of String(agent && agent.prompt || '').split(/\r?\n/)) {
    const line = cleanPromptLine(rawLine);
    if (!line || MENU_LINE_RE.test(line) || PROMPT_SKIP_RE.test(line)) continue;
    const match = COMMAND_LINE_RE.exec(line);
    if (match) {
      commandFallback = match[1].trim();
      continue;
    }
    fallback = line;
  }
  return commandFallback || fallback;
}

function render() {
  const listView = document.getElementById('agentListView');
  const previousScrollTop = listView.scrollTop;
  const blocked = agents.filter(a => agentStatusGroup(a)==='blocked');
  const working = agents.filter(a => agentStatusGroup(a)==='working');
  const ready = agents.filter(a => agentStatusGroup(a)==='ready');
  const other = agents.filter(a => agentStatusGroup(a)==='other');
  updateBlockedIndicators(blocked);
  document.getElementById('agentCount').textContent = agentCountLabel();
  let html = '';
  if (blocked.length) html += section('Blocked', 'var(--red)', blocked);
  if (working.length) html += section('Working', 'var(--yellow)', working);
  if (ready.length) html += section('Ready', 'var(--green)', ready);
  if (other.length) html += section('Other', 'var(--muted)', other);
  if (!agents.length) html = relayConfigs.length ? '<div class="empty">Waiting for agents…</div>' : '';
  document.getElementById('agents').innerHTML = html;
  listView.scrollTop = previousScrollTop;
}

function section(title, color, list) {
  return `<div class="section-header"><span class="dot" style="background:${color}"></span>${title}</div>` +
    sortedAgents(list).map(a => {
      const project = escapeHtml(displayName(a));
      const agent = escapeHtml(a.agent || 'agent');
      const status = escapeHtml(a.status || 'unknown');
      const host = escapeHtml(hostLabel(a));
      const paneArg = escapeHtml(JSON.stringify(a.pane_id));
      const blockedDetails = blockedCardDetails(a, paneArg);
      const classes = agentStatusGroup(a) === 'blocked' ? 'agent blocked-agent' : 'agent';
      return `<div class="${classes}" onclick='openTerminal(${paneArg})'>
        <span class="dot" style="background:${color}"></span>
        <div class="info"><div class="project">${project}<span class="host-badge">@${host}</span></div><div class="meta">${agent} · ${status}</div>${blockedDetails}</div>
      </div>`;
    }).join('');
}

function blockedCardDetails(agent, paneArg) {
  if (agentStatusGroup(agent) !== 'blocked') return '';
  const preview = approvalPromptPreview(agent);
  const previewHtml = preview ? `<div class="prompt-preview">${escapeHtml(preview)}</div>` : '';
  if (respondingPaneIds.has(agent.pane_id)) return previewHtml;
  const opts = approvalOptions(agent);
  const total = opts.length;
  const buttons = opts.map((option, index) => {
    const cls = approvalButtonClass(option, index, total);
    const label = escapeHtml(approvalButtonLabel(option, 48));
    return `<button type="button" class="${cls}" onclick='event.stopPropagation(); respondForPane(${paneArg}, ${index}, ${total})'>${label}</button>`;
  }).join('');
  return `${previewHtml}${buttons ? `<div class="agent-actions">${buttons}</div>` : ''}`;
}

function openTerminal(paneId) {
  navigateTo({view: 'terminal', paneId});
}

function showTerminalView(paneId) {
  activePane = paneId;
  lastInsertedBackspaces = 0;
  lastTerminalDisplayContent = '';
  currentView = 'terminal';
  clearInterval(refreshInterval);
  const a = agents.find(x => x.pane_id===paneId);
  activePaneSnapshot = a ? paneSnapshotFromAgent(a) : paneSnapshotFromId(paneId);
  syncTerminalChrome(a || null);
  document.getElementById('settingsView').style.display = 'none';
  document.getElementById('agentListView').style.display = 'none';
  document.getElementById('terminalView').classList.add('active');
  updateComposerState();
  updateBottomChromeHeight();
  refreshPane();
  refreshInterval = setInterval(refreshPane, 3000);
}

function renderTerminalActions(agent) {
  const qa = document.getElementById('quickActions');
  const next = nextBlockedAgent(agent);
  const nextAction = next ? `<button type="button" class="btn-next" onclick='openNextBlocked(${escapeHtml(JSON.stringify(next.pane_id))})'>Next blocked →</button>` : '';
  let html = '';
  if (agent && agentStatusGroup(agent) === 'blocked' && !respondingPaneIds.has(agent.pane_id)) {
    const opts = approvalOptions(agent);
    const total = opts.length;
    const actions = opts.map((option, index) => {
      const cls = approvalButtonClass(option, index, total);
      return `<button type="button" class="${cls}" onclick='respond(${index}, ${total})'>${escapeHtml(approvalButtonLabel(option))}</button>`;
    }).join('');
    html = `${actions}${nextAction}`;
  } else {
    html = nextAction;
  }
  qa.innerHTML = html;
  document.getElementById('terminalView').classList.toggle('has-quick-actions', Boolean(html));
  updateBottomChromeHeight();
}

function nextBlockedAgent(currentAgent) {
  const currentPaneId = currentAgent && currentAgent.pane_id;
  return sortedAgents(agents.filter(a => agentStatusGroup(a) === 'blocked' && a.pane_id !== currentPaneId))[0] || null;
}

function openNextBlocked(paneId) {
  if (currentView === 'terminal') replaceView({view: 'terminal', paneId});
  else openTerminal(paneId);
}

function closeTerminal() {
  closeCurrentView();
}

function terminalTitle(agent) {
  const primary = terminalPrimaryLabel(agent);
  const secondary = terminalSecondaryLabel(agent);
  return secondary ? `${primary} · ${secondary}` : primary;
}

function terminalPrimaryLabel(agent) {
